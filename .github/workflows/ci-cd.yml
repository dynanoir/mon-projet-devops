name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # ---- ÉTAPE 1 : Tests ----
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Installer les dépendances backend
        run: |
          cd backend
          npm install

      - name: Lancer les tests
        run: |
          cd backend
          npm test

  # ---- ÉTAPE 2 : Build et Push Docker ----
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build et push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  # ---- ÉTAPE 3 : Déploiement sur la VM ----
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Déployer sur la VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/backend:latest --ignore-not-found
            kubectl set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest --ignore-not-found
            kubectl rollout status deployment/backend --timeout=60s || true
            kubectl rollout status deployment/frontend --timeout=60s || true